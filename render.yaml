services:
  - type: web
    name: locallift-studio-api
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: BUSINESS_DB_FILE
        value: data/business-db.json
      - key: BUSINESS_DB_BACKUP_DIR
        value: data/backups
      - key: BUSINESS_DB_BACKUPS
        value: "true"
      - key: LOCALLIFT_ADMIN_TOKEN
        generateValue: true
      - key: CORS_ORIGIN
        value: https://locallift-studio-api.onrender.com
