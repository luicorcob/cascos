databases:
  - name: locallift-postgres
    plan: starter

services:
  - type: web
    name: locallift-studio-api
    runtime: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: BUSINESS_STORE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: locallift-postgres
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: BUSINESS_DB_BOOTSTRAP_FROM_JSON
        value: "false"
      - key: BUSINESS_DB_FILE
        value: /data/business-db.json
      - key: BUSINESS_DB_BACKUP_DIR
        value: /data/backups
      - key: BUSINESS_DB_BACKUPS
        value: "true"
      - key: GOOGLE_AUTH_DB_FILE
        value: /data/google-auth-db.json
      - key: LOCALLIFT_ADMIN_TOKEN
        generateValue: true
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DLS_DISCOVERY_PROVIDER
        value: openstreetmap
      - key: RADAR_LEADS_DB_FILE
        value: /data/radar-leads.json
      - key: DLS_DISCOVERY_CACHE_TTL_MS
        value: "900000"
      - key: DLS_RADAR_USER_AGENT
        value: DLS-Radar/1.0 (locallift-studio-api.onrender.com)
      - key: PUBLIC_DISCOVERY_RATE_LIMIT
        value: "40"
      - key: PUBLIC_DISCOVERY_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: CORS_ORIGIN
        value: https://locallift-studio-api.onrender.com
    disk:
      name: locallift-data
      mountPath: /data
      sizeGB: 1
