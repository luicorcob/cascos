<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abriendo el portal del cliente…</title>
    <meta name="robots" content="noindex">
    <script>
      (() => {
        const target = new URL("client-dashboard.html", window.location.href);
        const params = new URLSearchParams(window.location.search);
        if (!window.localStorage.getItem("locallift_client_session")) {
          params.set("adminPreview", "1");
        }
        target.search = params.toString();
        target.hash = window.location.hash;
        window.location.replace(target.href);
      })();
    </script>
  </head>
  <body>
    <p>Abriendo el <a href="client-dashboard.html">portal del cliente</a>…</p>
  </body>
</html>
